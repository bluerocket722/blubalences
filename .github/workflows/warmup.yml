name: Warm-Up Emails

# IMPORTANT: NO schedule/cron here. A frequent GitHub cron risks flagging the
# sending account, and warm-up timing is owned by the drip-warmup edge function
# (pinged every minute by Supabase pg_cron — see supabase/pg_cron_drip_warmup.sql).
# This workflow is manual-trigger only, for ad-hoc/debug invocations.
on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke drip-warmup edge function
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/drip-warmup" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            --fail-with-body
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
