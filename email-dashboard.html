<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Control — Blu Balence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-dark:#1141a8;--blue-light:#e8f0fe;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--text:#111827;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-light);color:var(--text);height:100vh;overflow:hidden}
#config-screen{position:fixed;inset:0;background:var(--gray-light);display:flex;align-items:center;justify-content:center;z-index:200}
#config-screen .box{background:#fff;border-radius:12px;padding:32px;width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
#config-screen h1{font-size:22px;font-weight:700;margin-bottom:6px}
#config-screen .sub{color:var(--gray);font-size:14px;margin-bottom:24px}
#app{display:none;width:100%;height:100vh;flex-direction:row}
#app.show{display:flex}
#sidebar{width:220px;background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 20px 20px;font-weight:700;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo span{opacity:.7;display:block;font-size:12px;font-weight:400;margin-top:2px}
nav{padding:12px 0;flex:1}
nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;cursor:pointer;transition:background .15s}
nav a:hover,nav a.active{background:rgba(255,255,255,.15);color:#fff}
nav a.active{font-weight:600}
nav a svg{width:18px;height:18px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
#topbar h1{font-size:18px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;border:1px solid var(--border)}
.card .label{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em}
.card .value{font-size:28px;font-weight:700;margin-top:6px}
.card .sub{font-size:12px;color:var(--gray);margin-top:4px}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);background:var(--gray-light)}
td{padding:12px 16px;font-size:14px;border-top:1px solid var(--border)}
tr:hover td{background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--gray-light);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;color:var(--blue);border:1px solid var(--blue)}
.btn-sm{padding:5px 10px;font-size:12px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.badge-green{background:#d1fae5;color:#065f46}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-purple{background:#ede9fe;color:#5b21b6}
.toggle{position:relative;width:40px;height:22px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:22px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.step-card{background:var(--gray-light);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.step-card-header{display:flex;align-items:center;justify-content:space-between}
.step-num{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-meta{font-size:12px;color:var(--gray);margin-top:4px}
.step-body-preview{font-size:12px;color:#374151;margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
textarea{resize:vertical;min-height:80px}
.section-title{font-size:13px;font-weight:600;margin:16px 0 8px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
.hint{font-size:12px;color:var(--gray);margin-top:4px}
  #login-overlay{position:fixed;inset:0;background:#0a1628;display:flex;align-items:center;justify-content:center;z-index:300}
#login-overlay .login-card{background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:40px 36px;width:100%;max-width:420px}
#login-overlay h1{color:#fff;font-size:26px;font-weight:700;margin-bottom:8px}
#login-overlay .login-sub{color:#9ca3af;font-size:15px;margin-bottom:28px}
#login-overlay .form-group label{color:#d1d5db;font-size:14px;font-weight:500;margin-bottom:6px;display:block}
#login-overlay .form-group input{background:#1f2937;border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:8px;padding:12px 14px;font-size:15px;width:100%;outline:none;transition:border-color .2s}
#login-overlay .form-group input:focus{border-color:#22c55e}
#login-overlay .login-btn{width:100%;background:#22c55e;color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
#login-overlay .login-btn:hover{background:#16a34a}
#login-overlay .login-err{color:#f87171;font-size:13px;margin-top:12px;text-align:center;min-height:20px}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;background:var(--blue-light);color:var(--blue-dark);margin-right:4px;margin-top:3px}
.info-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:20px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:500;color:var(--gray)}
.fg select,.fg input{padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#fff;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--blue)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-card .sv{font-size:26px;font-weight:700}
.stat-card .sl{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.stat-card .ss{font-size:12px;color:var(--gray);margin-top:2px}
.days-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.day-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--gray);transition:all .15s}
.day-chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* ── NEW STYLES ── */
.countdown-box{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.countdown-time{font-size:42px;font-weight:700;letter-spacing:.05em;font-family:monospace;font-variant-numeric:tabular-nums}
.countdown-label{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.countdown-detail{font-size:13px;opacity:.85;margin-top:6px}
.countdown-right{text-align:right;font-size:13px;opacity:.85;line-height:1.6}
.reply-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:flex-start;gap:14px}
.reply-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.09)}
.reply-card.unread{border-left:3px solid var(--blue)}
.reply-meta{flex:1;min-width:0}
.reply-from{font-weight:600;font-size:14px}
.reply-subj{font-size:13px;color:var(--gray);margin-top:2px}
.reply-preview{font-size:13px;color:#374151;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reply-time{font-size:11px;color:var(--gray);flex-shrink:0;white-space:nowrap}
.reply-thread{background:var(--gray-light);border-radius:8px;padding:14px;margin-bottom:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:260px;overflow-y:auto}
.inbox-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.inbox-info{flex:1;min-width:0}
.inbox-name{font-weight:600;font-size:15px}
.inbox-email{font-size:13px;color:var(--gray);margin-top:2px}
.inbox-hint{font-size:11px;color:var(--gray);margin-top:2px}
.seq-sched{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--blue-light);color:var(--blue-dark);margin-top:4px}
.unread-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:6px;flex-shrink:0}
.menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;margin-right:10px}
.menu-btn svg{width:24px;height:24px;color:var(--blue)}
#nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
#nav-overlay.show{display:block}
.dash-drag{cursor:grab}
.dash-drag:active{cursor:grabbing}
.dash-dragging{opacity:.4}
.help-btn{background:var(--blue-light);color:var(--blue-dark);border:none;border-radius:6px;padding:2px 9px;font-size:12px;font-weight:600;cursor:pointer;float:right}
.help-btn:hover{opacity:.85}
@media (max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .25s ease}
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex;align-items:center}
  #topbar{padding:14px 16px}
  #content{padding:16px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
  #topbar-actions .btn{font-size:13px;padding:8px 12px}
  table{font-size:13px}
  .inbox-card{flex-direction:column;align-items:stretch}
}
</style>
</head>

let sb;

function cfgVal(v) { return typeof v === 'string' ? v.replace(/^"|"$/g, '') : (v || ''); }

/* ─── COUNTDOWN ─── */
function computeNextSendMs(sendTime, sendDays, tz) {
  if (!sendTime || !sendDays || !sendDays.length) return null;
  const [sendH, sendM] = sendTime.split(':').map(Number);
  const now = new Date();
  for (let d = 0; d <= 7; d++) {
    const probe = new Date(now.getTime() + d * 86400000);
    const str = probe.toLocaleString('en-US', {
      timeZone: tz, hour12: false,
      year:'numeric', month:'2-digit', day:'2-digit',
      weekday:'short', hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
    const m = str.match(/(\w+),\s+(\d+)\/(\d+)\/(\d+),\s+(\d+):(\d+):(\d+)/);
    if (!m) continue;
    const [, wday, mo, da, yr, h, min, sec] = m;
    const dayKey = {Sun:'sun',Mon:'mon',Tue:'tue',Wed:'wed',Thu:'thu',Fri:'fri',Sat:'sat'}[wday] || '';
    if (!sendDays.includes(dayKey)) continue;
    const curMin = parseInt(h) * 60 + parseInt(min);
    const sendMin = sendH * 60 + sendM;
    if (d === 0 && curMin >= sendMin) continue;
    const tzNowMs = new Date(`${yr}-${mo}-${da}T${h}:${min}:${sec}Z`).getTime();
    const offset = probe.getTime() - tzNowMs;
    const tzSendMs = new Date(`${yr}-${mo}-${da}T${String(sendH).padStart(2,'0')}:${String(sendM).padStart(2,'0')}:00Z`).getTime();
    const utcSend = tzSendMs + offset;
    if (utcSend > now.getTime()) return utcSend - now.getTime();
  }
  return null;
}

function startCountdown(sendTime, sendDays, tz) {
  if (window._countdownTimer) clearInterval(window._countdownTimer);
  function tick() {
    const el = document.getElementById('cd-time');
    const dtEl = document.getElementById('cd-next');
    if (!el) { clearInterval(window._countdownTimer); return; }
    const ms = computeNextSendMs(sendTime, sendDays, tz);
    if (ms === null) { el.textContent = '—'; if (dtEl) dtEl.textContent = 'No schedule'; return; }
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600), min = Math.floor((s % 3600) / 60), sec = s % 60;
    el.textContent = `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    if (dtEl) {
      const next = new Date(Date.now() + ms);
      dtEl.textContent = next.toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
    }
  }
  tick();
  window._countdownTimer = setInterval(tick, 1000);
}

async function checkRunStatus(poll) {
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;
  if (!token || !repo) return;
  const box = document.getElementById('run-status-box');
  const dot = document.getElementById('run-status-dot');
  const text = document.getElementById('run-status-text');
  const time = document.getElementById('run-status-time');
  const link = document.getElementById('run-status-link');
  if (!box) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/runs?per_page=1`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    const data = await r.json();
    const run = data.workflow_runs?.[0];
    if (!run) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    link.href = run.html_url;
    const started = new Date(run.created_at).toLocaleString();
    if (run.status === 'in_progress' || run.status === 'queued') {
      dot.style.background = '#f59e0b';
      text.textContent = run.status === 'queued' ? 'Queued — starting soon…' : 'Running — emails sending now…';
      time.textContent = `Started ${started}`;
      if (poll !== false) setTimeout(() => checkRunStatus(true), 10000);
    } else if (run.conclusion === 'success') {
      dot.style.background = '#10b981';
      text.textContent = 'Completed successfully';
      time.textContent = `Finished ${new Date(run.updated_at).toLocaleString()}`;
      if (poll) refreshLog();
    } else if (run.conclusion === 'failure') {
      dot.style.background = '#ef4444';
      text.textContent = 'Run failed — check GitHub Actions for details';
      time.textContent = `Failed ${new Date(run.updated_at).toLocaleString()}`;
    } else {
      dot.style.background = '#d1d5db';
      text.textContent = `Last run: ${run.conclusion || run.status}`;
      time.textContent = started;
    }
  } catch(e) { box.style.display = 'none'; }
}

async function sendNow() {
  const btn = document.getElementById('send-btn');
  const status = document.getElementById('send-status');
  btn.disabled = true;
  status.textContent = 'Triggering…';
  status.style.color = 'var(--gray)';
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;
  if (!token || !repo) {
    status.textContent = 'GitHub token and repo not set in Settings.';
    status.style.color = 'var(--red)';
    btn.disabled = false;
    return;
  }
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/dispatches`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' }),
    });
    if (r.status === 204) {
      status.textContent = '✓ Triggered!';
      status.style.color = 'var(--green)';
      setTimeout(() => checkRunStatus(true), 3000);
    } else {
      const err = await r.json();
      status.textContent = 'Error: ' + (err.message || r.status);
      status.style.color = 'var(--red)';
    }
  } catch (e) {
    status.textContent = 'Failed: ' + e.message;
    status.style.color = 'var(--red)';
  }
  btn.disabled = false;
}

  async function loadBrevoStats(apiKey, targetId) {
  const el = document.getElementById(targetId || 'brevo-stats-panel');
  if (!el) return;
  if (!apiKey) {
    el.innerHTML = '<div class="info-banner" style="margin:16px">⚠️ Add your Brevo API key in Settings to see live delivery stats.</div>';
    return;
  }
  el.innerHTML = '<div style="padding:16px;color:var(--gray);font-size:13px">Loading Brevo stats…</div>';
  try {
    const end = new Date().toISOString().slice(0, 10);
    const start = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
    const r = await fetch(`https://api.brevo.com/v3/smtp/statistics/aggregatedReport?startDate=${start}&endDate=${end}`, {
      headers: { 'api-key': apiKey, 'Content-Type': 'application/json' }
    });
    if (!r.ok) {
      el.innerHTML = `<div class="info-banner" style="margin:16px">⚠️ Brevo API error ${r.status} — check your API key in Settings.</div>`;
      return;
    }
    const d = await r.json();
    const sent = d.requests || 0;
    const delivered = d.delivered || 0;
    const uniqueOpens = d.uniqueOpens || 0;
    const opens = d.opens || 0;
    const uniqueClicks = d.uniqueClicks || 0;
    const clicks = d.clicks || 0;
    const hardBounces = d.hardBounces || 0;
    const softBounces = d.softBounces || 0;
    const spam = d.spamReports || 0;
    const blocked = d.blocked || 0;
    const invalid = d.invalid || 0;
    const unsubs = d.unsubscriptions || 0;
    try {
      await sb.from('brevo_stats').upsert({
        period_start: start, period_end: end, fetched_at: new Date().toISOString(),
        requests: sent, delivered, unique_opens: uniqueOpens, opens,
        unique_clicks: uniqueClicks, clicks, hard_bounces: hardBounces,
        soft_bounces: softBounces, spam_reports: spam, blocked, invalid, unsubscriptions: unsubs
      }, { onConflict: 'period_end' });
    } catch(e) { console.warn('brevo_stats save failed:', e.message); }
    const pct = (n) => sent > 0 ? (n / sent * 100).toFixed(2) : '0.00';
    const bar = (val, color) => `<div style="height:6px;background:var(--border);border-radius:3px;margin-top:6px"><div style="height:6px;background:${color};border-radius:3px;width:${Math.min(parseFloat(val),100)}%"></div></div>`;
    el.innerHTML = `
      <div class="panel-header">
        <h2>Brevo Delivery Stats <span style="font-size:12px;font-weight:400;color:var(--gray)">(last 30 days)</span></h2>
        <span style="font-size:13px;font-weight:700">${sent} emails sent</span>
      </div>
      <div style="padding:20px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:18px">
          <div><div style="font-size:13px;color:var(--gray);margin-bottom:2px">Delivered</div><div style="font-weight:700;font-size:18px">${pct(delivered)}%</div>${bar(pct(delivered),'#1a56db')}</div>
          <div><div style="font-size:13px;color:var(--gray);margin-bottom:2px">Estimated openers</div><div style="font-weight:700;font-size:18px">${uniqueOpens}</div>${bar(pct(uniqueOpens),'#10b981')}</div>
          <div><div style="font-size:13px;color:var(--gray);margin-bottom:2px">Trackable openers</div><div style="font-weight:700;font-size:18px">${pct(opens)}%</div>${bar(pct(opens),'#10b981')}</div>
          <div><div style="font-size:13px;color:var(--gray);margin-bottom:2px">Unique clickers</div><div style="font-weight:700;font-size:18px">${pct(uniqueClicks)}%</div>${bar(pct(uniqueClicks),'#10b981')}</div>
          <div><div style="font-size:13px;color:var(--gray);margin-bottom:2px">Bounced</div><div style="font-weight:700;font-size:18px">${(parseFloat(pct(hardBounces))+parseFloat(pct(softBounces))).toFixed(2)}%</div>${bar(0,'#d1d5db')}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="font-size:13px;color:var(--gray)">Complaint <strong style="color:var(--text)">${pct(spam)}%</strong></div>
          <div style="font-size:13px;color:var(--gray)">Hard bounce <strong style="color:var(--text)">${pct(hardBounces)}%</strong></div>
          <div style="font-size:13px;color:var(--gray)">Soft bounce <strong style="color:var(--text)">${pct(softBounces)}%</strong></div>
          <div style="font-size:13px;color:var(--gray)">Blocked <strong style="color:var(--text)">${pct(blocked)}%</strong></div>
        </div>

  } catch(e) {

function renderBrevoHistory(history, targetId) {
  const el = document.getElementById(targetId);
  if (!el || !history || !history.length) { if(el) el.innerHTML=''; return; }
  const rows = history.map(h => {
    const sent = h.requests || 0;
    const pct = (n) => sent > 0 ? (n / sent * 100).toFixed(1) + '%' : '—';
    return `<tr>
      <td>${new Date(h.fetched_at).toLocaleDateString()}</td>
      <td style="font-size:12px;color:var(--gray)">${h.period_start} → ${h.period_end}</td>
      <td>${sent}</td>
      <td>${pct(h.delivered)}</td>
      <td>${h.unique_opens}</td>
      <td>${pct(h.opens)}</td>
      <td>${pct(h.unique_clicks)}</td>
      <td>${pct((h.hard_bounces||0)+(h.soft_bounces||0))}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <div class="panel-header"><h2>Brevo Stats History</h2></div>
    <table><thead><tr><th>Fetched</th><th>Period</th><th>Sent</th><th>Delivered</th><th>Uniq Opens</th><th>Open Rate</th><th>Click Rate</th><th>Bounce Rate</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

async function openSeqInboxModal(seqId, seqName) {
  const { data: allInboxes } = await sb.from('inboxes').select('*').eq('active', true).order('created_at');
  const { data: assigned }   = await sb.from('sequence_inboxes').select('*').eq('sequence_id', seqId);
  const aMap = {};
  (assigned || []).forEach(a => { aMap[a.inbox_id] = a; });
  if (!allInboxes || !allInboxes.length) {
    showModal(`<h2>Inboxes — ${seqName}</h2><div class="empty" style="padding:20px">No active inboxes. Add one in the Inboxes tab first.</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
    return;
  }
  const rows = allInboxes.map(ib => {
    const a      = aMap[ib.id] || {};
    const isOn   = !!(a.inbox_id && a.active !== false);
    const useLim = !!(a.use_inbox_limit);
    const lim    = a.daily_limit || 0;
    return `<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${isOn?'10px':'0'}">
        <label class="toggle" style="margin:0"><input type="checkbox" id="sqi-chk-${ib.id}" ${isOn?'checked':''} onchange="toggleSeqInboxRow('${ib.id}')"><span class="toggle-slider"></span></label>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${ib.name}</div>
          <div style="font-size:12px;color:var(--gray)">${ib.email}</div>
        </div>
      </div>
      <div id="sqi-opts-${ib.id}" style="${isOn?'':'display:none'}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <label class="toggle" style="margin:0"><input type="checkbox" id="sqi-uselim-${ib.id}" ${useLim?'checked':''} onchange="toggleSeqInboxLimitRow('${ib.id}')"><span class="toggle-slider"></span></label>
          <span style="font-size:13px;color:var(--gray)">Set a custom daily send limit for this inbox</span>
        </div>
        <div id="sqi-limwrap-${ib.id}" style="${useLim?'':'display:none'}">
          <div class="form-group" style="margin:0">
            <label style="font-size:12px;color:var(--gray)">Max emails/day from this inbox (this sequence only)</label>
            <input id="sqi-lim-${ib.id}" type="number" min="0" value="${lim}" placeholder="e.g. 50">
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  showModal(`
    <h2>Inboxes — ${seqName}</h2>
    <p class="hint" style="margin-bottom:14px">Toggle inboxes on to include them in this sequence. The drip script rotates through enabled inboxes picking the one with fewest sends today. Each contact locks to one inbox for the whole sequence so same-thread replies stay consistent.</p>
    ${rows}
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSeqInboxes('${seqId}')">Save</button>
    </div>`, true);
}

function toggleSeqInboxRow(inboxId) {
  const checked = document.getElementById(`sqi-chk-${inboxId}`).checked;
  document.getElementById(`sqi-opts-${inboxId}`).style.display = checked ? '' : 'none';
}

function toggleSeqInboxLimitRow(inboxId) {
  const checked = document.getElementById(`sqi-uselim-${inboxId}`).checked;
  document.getElementById(`sqi-limwrap-${inboxId}`).style.display = checked ? '' : 'none';
}

async function saveSeqInboxes(seqId) {
  const { data: allInboxes } = await sb.from('inboxes').select('id').eq('active', true);
  if (!allInboxes) return;
  for (const ib of allInboxes) {
    const chk = document.getElementById(`sqi-chk-${ib.id}`);
    if (!chk) continue;
    const active  = chk.checked;
    const useLim  = document.getElementById(`sqi-uselim-${ib.id}`)?.checked || false;
    const lim     = parseInt(document.getElementById(`sqi-lim-${ib.id}`)?.value || '0') || 0;
    await sb.from('sequence_inboxes').upsert(
      { sequence_id: seqId, inbox_id: ib.id, active, use_inbox_limit: useLim, daily_limit: lim },
      { onConflict: 'sequence_id,inbox_id' }
    );
  }
  closeModal();
}

async function saveSeq(id) {
  const name = document.getElementById('sq-name').value.trim();
  const description = document.getElementById('sq-desc').value.trim();
  if (!name) { alert('Name required'); return; }
  const send_time = document.getElementById('sq-time').value || null;
  const checkedDays = Array.from(document.querySelectorAll('.sq-day.on')).map(el => el.dataset.day);
  const send_days = checkedDays.length ? checkedDays.join(',') : null;
  const same_thread = document.getElementById('sq-thread').checked;
  const is_warmup = document.getElementById('sq-warmup').checked;
  const min_interval_minutes = parseInt(document.getElementById('sq-minint').value) || 5;
  const max_interval_minutes = parseInt(document.getElementById('sq-maxint').value) || 15;
  const payload = { name, description, send_time, send_days, same_thread, is_warmup, min_interval_minutes, max_interval_minutes };
  if (id) await sb.from('sequences').update(payload).eq('id', id);
  else await sb.from('sequences').insert({ ...payload, active: true });
  closeModal();
  renderSequences();
}

  async function startWarmupDrip(seqId, seqName) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳ Running…';
  try {
    const { data, error } = await sb.functions.invoke('drip-warmup');
    if (error) throw error;
    const sent = data?.sent ?? 0;
    btn.textContent = `✓ Sent ${sent}`;
    setTimeout(() => { btn.disabled = false; btn.textContent = '▶ Start Drip'; }, 3000);
  } catch (e) {
    alert('Error: ' + (e.message || e));
    btn.disabled = false;
    btn.textContent = '▶ Start Drip';
  }
}

  async function openWarmupLog(seqId, seqName) {
    // First get enrollment IDs for this sequence
  const { data: enrIds } = await sb
    .from('enrollments')
    .select('id')
    .eq('sequence_id', seqId);

  const ids = (enrIds || []).map(e => e.id);
  if (!ids.length) {
    showModal(`<h2>📋 Warm-up Log — ${seqName}</h2><div class="empty">No enrollments in this sequence yet.</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`, true);
    return;
  }

  const { data: logs } = await sb
    .from('send_log')
    .select('sent_at,step_number,brevo_message_id,status,enrollment_id,enrollments(email,name)')
    .in('enrollment_id', ids)
    .order('sent_at', { ascending: false })
    .limit(500);

  // filter client-side since supabase filters on joined tables don't exclude nulls automatically
  const rows = (logs || []).filter(l => l.enrollments);

  // Build per-contact summary
  const contacts = {};
  for (const l of rows) {
    const email = l.enrollments?.email || '—';
    if (!contacts[email]) contacts[email] = { name: l.enrollments?.name || '—', sends: [] };
    contacts[email].sends.push(l);
  }

  const tableRows = Object.entries(contacts).map(([email, c]) => {
    const lastSend = c.sends[0];
    const lastDate = lastSend ? new Date(lastSend.sent_at).toLocaleString() : '—';
    const stepsSent = [...new Set(c.sends.map(s => s.step_number))].sort((a,b)=>a-b).join(', ');
    return `<tr>
      <td>${email}</td>
      <td>${c.name}</td>
      <td style="font-size:12px">${stepsSent || '—'}</td>
      <td style="font-size:12px;color:var(--gray)">${lastDate}</td>
      <td><span class="badge ${c.sends.length > 0 ? 'badge-green' : 'badge-gray'}">${c.sends.length} send${c.sends.length!==1?'s':''}</span></td>
    </tr>`;
  }).join('');

  showModal(`
    <h2>📋 Warm-up Log — ${seqName}</h2>
    <p class="hint" style="margin-bottom:14px">Showing last 200 sends. Each row is a contact — click their email to see all steps sent.</p>
    ${!tableRows
      ? '<div class="empty">No sends logged yet. Start the drip and check back.</div>'
      : `<div style="overflow-x:auto"><table>
          <thead><tr><th>Email</th><th>Name</th><th>Steps Sent</th><th>Last Send</th><th>Total</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table></div>`}
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:16px;font-size:13px;color:var(--gray)">
      <span>Total contacts: <strong>${Object.keys(contacts).length}</strong></span>
      <span>Total sends: <strong>${rows.length}</strong></span>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
  `, true);
}

function delay(s) {
  const parts = [s.delay_days>0?`${s.delay_days}d`:'', s.delay_hours>0?`${s.delay_hours}h`:'', s.delay_minutes>0?`${s.delay_minutes}m`:''].filter(Boolean);
  return parts.length ? parts.join(' ') : 'Immediately';
}

function stepCard(s) {
  const batchLimit = s.batch_limit > 0 ? s.batch_limit : null;
  const interval = s.batch_interval_minutes > 0 ? s.batch_interval_minutes : null;
  const batchText = batchLimit ? `Batch: ${batchLimit} emails${interval ? `, ${interval} min apart` : ''}` : (interval ? `${interval} min between emails` : 'No batch limit');
  const tagPills = s.tags ? s.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag-pill">${t}</span>`).join('') : '';
  const bodyPreview = s.body ? s.body.replace(/<[^>]+>/g, '').trim().substring(0, 80) + (s.body.length > 80 ? '…' : '') : '';
  return `<div class="step-card">
    <div class="step-card-header">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <div class="step-num" style="margin-top:2px">${s.step_number}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">${s.subject}</div>
          <div class="step-meta">Wait: ${delay(s)} · ${s.from_email}</div>
          ${bodyPreview ? `<div class="step-body-preview">"${bodyPreview}"</div>` : ''}
          <div class="step-meta" style="margin-top:4px">${batchText}</div>
          ${tagPills ? `<div style="margin-top:5px">${tagPills}</div>` : ''}
        </div>
      </div>
      <div class="actions" style="flex-shrink:0;margin-left:10px">
        <button class="btn btn-secondary btn-sm" onclick="openStepForm('${s.sequence_id}','_',${s.step_number},'${s.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStep('${s.id}','${s.sequence_id}')">×</button>
      </div>
    </div>
  </div>`;
}

async function saveStep(seqId, seqName, stepNum, stepId) {
  const payload = {
    sequence_id: seqId, step_number: stepNum,
    subject: document.getElementById('st-subj').value.trim(),
    from_email: document.getElementById('st-from').value.trim(),
    template_id: 1,
    delay_days: parseInt(document.getElementById('st-days').value) || 0,
    delay_hours: parseInt(document.getElementById('st-hours').value) || 0,
    delay_minutes: parseInt(document.getElementById('st-mins').value) || 0,
    body: document.getElementById('st-body').value,
    batch_limit: parseInt(document.getElementById('st-batch').value) || 0,
    batch_interval_minutes: parseInt(document.getElementById('st-interval').value) || 0,
    tags: document.getElementById('st-tags').value.trim(),
  };
  if (!payload.subject || !payload.from_email) { alert('Subject and From email are required'); return; }
  let error;
  if (stepId) ({ error } = await sb.from('steps').update(payload).eq('id', stepId));
  else ({ error } = await sb.from('steps').insert(payload));
  if (error) { alert('Save failed: ' + error.message); return; }
  openStepsModal(seqId, seqName);
}

async function deleteStep(stepId, seqId) {
  if (!confirm('Delete this step?')) return;
  await sb.from('steps').delete().eq('id', stepId);
  const { data: seq } = await sb.from('sequences').select('name').eq('id', seqId).single();
  openStepsModal(seqId, seq?.name || '');
}

      `<table><thead><tr><th>Email</th><th>Name</th><th>Sequence</th><th>Step</th><th>Status</th><th>Last Sent</th><th>Actions</th></tr></thead><tbody>

}

async function removeEnr(id) {

  sb.from('enrollments').delete().eq('id', id).then(() => renderSubscribers());
}

async function enrollOne() {

async function bulkEnroll() {
  const seq = document.getElementById('bl-seq').value;
  const csv = document.getElementById('bl-csv').value.trim();
  if (!seq || !csv) { alert('Sequence and CSV required'); return; }
    const rows = csv.split('\n').map(line => {
    const [email, nameVal, companyVal] = line.split(',').map(s => s.trim());
    return email && email.includes('@') ? { email, name: nameVal || null, company: companyVal || null, sequence_id: seq, current_step: 0, status: 'active' } : null;
  }).filter(Boolean);
  if (!rows.length) { alert('No valid emails found'); return; }
  const { error } = await sb.from('enrollments').upsert(rows, { onConflict: 'email,sequence_id', ignoreDuplicates: true });
  if (error) { alert(error.message); return; }
  closeModal(); renderSubscribers();

/* ─── ANALYTICS ─── */
async function renderAnalytics() {
  const BADGE = {
    opened:'badge-green', clicked:'badge-purple', bounced:'badge-yellow',
    softBounce:'badge-yellow', hardBounce:'badge-yellow', spam:'badge-red',
    unsubscribed:'badge-red', delivered:'badge-blue', deferred:'badge-yellow',
    error:'badge-red', sent:'badge-gray', blocked:'badge-yellow', invalid_email:'badge-red',
  };
  const cutoff = aF.days ? new Date(Date.now() - parseInt(aF.days) * 86400000).toISOString() : null;
    const [{ data: seqs }, { data: logs }, { data: evts }, { data: aSettRows }, { data: brevoHistory }] = await Promise.all([
    sb.from('sequences').select('id,name').order('name'),
    sb.from('send_log').select('id,sent_at,step_number,brevo_message_id,enrollment_id,enrollments(email,name,sequence_id,sequences(name))').order('sent_at', { ascending: false }).limit(1000),
    sb.from('email_events').select('message_id,email,event_type,event_at').limit(2000),
    sb.from('settings').select('key,value'),
    sb.from('brevo_stats').select('*').order('fetched_at', { ascending: false }).limit(30),
  ]);
  
    const aCfg = Object.fromEntries((aSettRows||[]).map(r => [r.key, cfgVal(r.value)]));
  const aBrevoKey = aCfg.brevo_api_key || '';
  const evByMsg = {};
  (evts||[]).forEach(e => { if (!evByMsg[e.message_id]) evByMsg[e.message_id] = []; evByMsg[e.message_id].push(e); });
  let filteredLogs = logs || [];
  if (cutoff) filteredLogs = filteredLogs.filter(l => l.sent_at >= cutoff);
  if (aF.seqId) filteredLogs = filteredLogs.filter(l => l.enrollments?.sequence_id === aF.seqId);
  if (aF.search) { const q = aF.search.toLowerCase(); filteredLogs = filteredLogs.filter(l => (l.enrollments?.email||'').toLowerCase().includes(q) || (l.enrollments?.sequences?.name||'').toLowerCase().includes(q)); }
  const totalSent = filteredLogs.length;
  const evCounts = {};
  filteredLogs.forEach(l => { (evByMsg[l.brevo_message_id]||[]).forEach(e => { evCounts[e.event_type] = (evCounts[e.event_type]||0)+1; }); });
  const opens=evCounts['opened']||0, clicks=evCounts['clicked']||0;
  const bounces=(evCounts['bounced']||0)+(evCounts['softBounce']||0)+(evCounts['hardBounce']||0);
  const unsubs=evCounts['unsubscribed']||0, spam=evCounts['spam']||0, delivered=evCounts['delivered']||0;
  const hasWebhook = evts && evts.length > 0;
  const openRate=totalSent>0?(opens/totalSent*100).toFixed(1):'0.0';
  const clickRate=totalSent>0?(clicks/totalSent*100).toFixed(1):'0.0';
  const bounceRate=totalSent>0?(bounces/totalSent*100).toFixed(1):'0.0';
  const bySeq = {};
  filteredLogs.forEach(l => {
    const sid=l.enrollments?.sequence_id||'unknown', sname=l.enrollments?.sequences?.name||'Unknown';
    if (!bySeq[sid]) bySeq[sid]={name:sname,sent:0,opens:0,clicks:0};
    bySeq[sid].sent++;
    (evByMsg[l.brevo_message_id]||[]).forEach(e => { if(e.event_type==='opened') bySeq[sid].opens++; if(e.event_type==='clicked') bySeq[sid].clicks++; });
  });
  const domainMap = {};
  filteredLogs.forEach(l => { const dom=(l.enrollments?.email||'').split('@')[1]||'unknown'; domainMap[dom]=(domainMap[dom]||0)+1; });
  const topDomains = Object.entries(domainMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  document.getElementById('content').innerHTML = `
    ${!hasWebhook?`<div class="info-banner">ℹ️ <strong>Open &amp; click tracking requires Brevo webhooks.</strong> Set up the <code>brevo-webhook</code> Supabase Edge Function and point your Brevo webhook URL there.</div>`:''}
        <div id="brevo-analytics-panel" class="panel" style="margin-bottom:20px"></div>
    <div id="brevo-history-panel" class="panel" style="margin-bottom:20px"></div>
    <div class="filter-bar">
      <div class="fg"><label>Date Range</label>
        <select onchange="aF.days=this.value;renderAnalytics()">
          <option value="7" ${aF.days==='7'?'selected':''}>Last 7 days</option>
          <option value="30" ${aF.days==='30'?'selected':''}>Last 30 days</option>
          <option value="90" ${aF.days==='90'?'selected':''}>Last 90 days</option>
          <option value="" ${aF.days===''?'selected':''}>All time</option>
        </select>
      </div>
      <div class="fg"><label>Sequence</label>
        <select onchange="aF.seqId=this.value;renderAnalytics()">
          <option value="">All sequences</option>
          ${(seqs||[]).map(s=>`<option value="${s.id}" ${aF.seqId===s.id?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Search email</label>
        <input type="text" placeholder="Search…" value="${aF.search||''}" oninput="aF.search=this.value;renderAnalytics()" style="width:180px">
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="sv">${totalSent}</div><div class="sl">Sent</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--blue)">${delivered}</div><div class="sl">Delivered</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--green)">${opens}</div><div class="sl">Opened</div><div class="ss">${openRate}%</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--purple)">${clicks}</div><div class="sl">Clicked</div><div class="ss">${clickRate}%</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--yellow)">${bounces}</div><div class="sl">Bounced</div><div class="ss">${bounceRate}%</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--red)">${unsubs}</div><div class="sl">Unsubs</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--red)">${spam}</div><div class="sl">Spam</div></div>
    </div>
    ${Object.keys(bySeq).length>1?`<div class="panel" style="margin-bottom:20px"><div class="panel-header"><h2>By Sequence</h2></div>
      <table><thead><tr><th>Sequence</th><th>Sent</th><th>Opens</th><th>Open Rate</th><th>Clicks</th><th>Click Rate</th></tr></thead><tbody>
      ${Object.values(bySeq).sort((a,b)=>b.sent-a.sent).map(s=>`<tr><td><strong>${s.name}</strong></td><td>${s.sent}</td><td>${s.opens}</td><td>${s.sent>0?(s.opens/s.sent*100).toFixed(1):0}%</td><td>${s.clicks}</td><td>${s.sent>0?(s.clicks/s.sent*100).toFixed(1):0}%</td></tr>`).join('')}
      </tbody></table></div>`:''}
    ${topDomains.length?`<div class="panel" style="margin-bottom:20px"><div class="panel-header"><h2>Top Domains</h2></div>
      <table><thead><tr><th>Domain</th><th>Count</th></tr></thead><tbody>
      ${topDomains.map(([d,c])=>`<tr><td>${d}</td><td>${c}</td></tr>`).join('')}
      </tbody></table></div>`:''}
    <div class="panel"><div class="panel-header"><h2>Send Log</h2></div>
      ${!filteredLogs.length?'<div class="empty">No sends found for the selected filters.</div>':
      `<table><thead><tr><th>Sent At</th><th>Email</th><th>Sequence</th><th>Step</th><th>Events</th></tr></thead><tbody>
      ${filteredLogs.slice(0,200).map(l=>{
        const evs=evByMsg[l.brevo_message_id]||[];
        const badges=evs.map(e=>`<span class="badge ${BADGE[e.event_type]||'badge-gray'}">${e.event_type}</span>`).join(' ');
        return `<tr><td>${new Date(l.sent_at).toLocaleString()}</td><td>${l.enrollments?.email||'—'}</td><td>${l.enrollments?.sequences?.name||'—'}</td><td>Step ${l.step_number}</td><td>${badges||'<span class="badge badge-gray">sent</span>'}</td></tr>`;
      }).join('')}</tbody></table>`}
        </div>`;
  await loadBrevoStats(aBrevoKey, 'brevo-analytics-panel');
  renderBrevoHistory(brevoHistory, 'brevo-history-panel');
}

        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
        <button class="btn btn-secondary" onclick="resetConn()">Change Supabase Connection</button>
      </div>

    ['send_time', document.getElementById('s-time').value],
    ['send_timezone', document.getElementById('s-tz').value],
    ['send_days', sendDays],
    ['warmup_min_minutes', document.getElementById('s-wmin').value],
    ['warmup_max_minutes', document.getElementById('s-wmax').value],
    ['warmup_lookback_hours', document.getElementById('s-lookback').value],
    ['warmup_campaign_start', document.getElementById('s-wstart').value],

}

function resetConn() { localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key'); location.reload(); }

/* ─── AUTO-SEND ─── */
async function triggerDrip(token, repo) {
  const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/dispatches`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ ref: 'main' }),
  });
  return r.status === 204;
}

function initAutoSend() {
  if (window._autoSendTimer) clearInterval(window._autoSendTimer);
  window._autoSendTimer = setInterval(async () => {
    try {
      const { data: rows } = await sb.from('settings').select('key,value');
      const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
      const token = cfg.github_token || '', repo = cfg.github_repo || '';
      if (!token || !repo) return;
      const tz = cfg.send_timezone || 'America/New_York';
      const now = new Date();
      const str = now.toLocaleString('en-US', { timeZone: tz, hour12: false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', weekday:'short' });
      const m = str.match(/(\w+),\s+(\d+)\/(\d+)\/(\d+),\s+(\d+):(\d+)/);
      if (!m) return;
      const [, dayName, month, day, year, hour, minute] = m;
      const currentTime = `${hour.padStart(2,'0')}:${minute.padStart(2,'0')}`;
      const dayMap = {Sun:'sun',Mon:'mon',Tue:'tue',Wed:'wed',Thu:'thu',Fri:'fri',Sat:'sat'};
      const currentDay = dayMap[dayName] || '';
      const dateKey = `${year}-${month}-${day}`;

      // Global schedule
      const globalTime = cfg.send_time || '';
      if (globalTime) {
        const globalDays = (cfg.send_days||'mon,tue,wed,thu,fri').split(',').map(d=>d.trim());
        const sk = `auto_sent_${dateKey}_${globalTime}`;
        if (currentTime === globalTime && globalDays.includes(currentDay) && !sessionStorage.getItem(sk)) {
          sessionStorage.setItem(sk, '1');
          const ok = await triggerDrip(token, repo);
          console.log(`[auto-send] Global trigger: ${ok ? 'ok' : 'failed'}`);
        }
      }

      // Per-sequence schedules
      const { data: seqRows } = await sb.from('sequences').select('id,name,send_time,send_days,active').eq('active', true);
      for (const seq of (seqRows||[])) {
        if (!seq.send_time) continue;
        const seqDays = (seq.send_days || cfg.send_days || 'mon,tue,wed,thu,fri').split(',').map(d=>d.trim());
        const sk = `auto_sent_seq_${seq.id}_${dateKey}_${seq.send_time}`;
        if (currentTime === seq.send_time && seqDays.includes(currentDay) && !sessionStorage.getItem(sk)) {
          sessionStorage.setItem(sk, '1');
          const ok = await triggerDrip(token, repo);
          console.log(`[auto-send] Seq "${seq.name}" trigger: ${ok ? 'ok' : 'failed'}`);
        }
      }
    } catch(e) { console.warn('[auto-send] error:', e.message); }
  }, 30000);
}

function computeInboxWarmupLimit(ib) {
  const hard = parseInt(ib.warmup_daily_limit) || 0;
  if (hard > 0) return hard;                      // hard cap overrides everything
  const start = parseInt(ib.warmup_start_sends) || 0;
  const target = parseInt(ib.warmup_target_sends) || 0;
  const ramp = parseInt(ib.warmup_ramp_days) || 30;
  if (!ib.warmup_started_at) return target || start;
  const d0 = new Date(ib.warmup_started_at);
  const day = Math.floor((Date.now() - d0.getTime()) / 86400000) + 1;
  if (day < 1) return 0;
  const frac = Math.min(day / ramp, 1);
  return Math.round(start + (target - start) * frac);
}

      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      ${isWarmup
        ? `<button class="btn btn-primary" onclick="queueWarmupReply('${r.id}')">Send Reply (from ${r.to_email})</button>`
        : `<button class="btn btn-primary" onclick="sendReplyEmail('${r.id}','${esc(r.from_email)}','${esc(r.message_id||'')}')">Send Reply</button>`}
    </div>`;

  const statusButtons = (isWarmup || isOutgoing) ? '' : `
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn btn-sm" style="background:#f0a500;color:#fff;border:none" onclick="markReplyStatus('${r.id}','${esc(r.from_email)}','opportunity')">🌟 Opportunity</button>

    </div>`;

    <h2 style="margin-bottom:4px">${isOutgoing?'Sent message':('Reply from '+(r.from_name||r.from_email))}</h2>
    <div style="font-size:13px;color:var(--gray);margin-bottom:12px">
      <strong>From:</strong> ${r.from_name ? `${r.from_name} &lt;${r.from_email}&gt;` : r.from_email}<br>
      <strong>To:</strong> ${r.to_email||'—'}<br>
      <strong>Subject:</strong> ${r.subject||'(no subject)'}<br>
      <strong>${isOutgoing?'Sent':'Received'}:</strong> ${new Date(r.received_at).toLocaleString()}

    ${r.replied_at ? `<div class="info-banner" style="margin-bottom:12px">✓ Replied on ${new Date(r.replied_at).toLocaleString()}</div>` : ''}

async function markReplyStatus(replyId, fromEmail, status) {
  await sb.from('replies').update({ status }).eq('id', replyId);
  await sb.from('enrollments').update({ status: 'stopped' }).eq('email', fromEmail).eq('status', 'active');
  closeModal();
  renderReplies();
  alert(status === 'opportunity' ? '🌟 Marked as Opportunity — sequences stopped.' : '🚫 Marked as No — sequences stopped.');
}

async function queueWarmupReply(replyId) {
  const body = document.getElementById('rp-body').value.trim();
  if (!body) { alert('Message is required'); return; }
  await sb.from('replies').update({ pending_reply: body, pending_status: 'queued' }).eq('id', replyId);
  closeModal();
  renderReplies();
  alert('Reply queued — it will send from the warm-up mailbox within ~1 minute.');
}

async function sendReplyEmail(replyId, toEmail, inReplyTo) {
  const subject = document.getElementById('rp-subj').value.trim();
  const body = document.getElementById('rp-body').value.trim();
  if (!body) { alert('Message is required'); return; }
  const inboxEl = document.getElementById('rp-inbox');
  let fromEmail, fromName, brevoKey;
  if (inboxEl && inboxEl.value) {
    const inbox = (window._replyInboxes||[]).find(ib => ib.id === inboxEl.value);
    if (inbox) { fromEmail = inbox.email; fromName = inbox.name; brevoKey = inbox.brevo_api_key || window._replyCfg?.brevo_api_key; }
  }
  if (!fromEmail) {
    const raw = window._replyCfg?.from_email || '';
    const m = raw.match(/^(.+?)\s*<(.+?)>\s*$/);
    fromEmail = m ? m[2] : raw;
    fromName = m ? m[1] : '';
    brevoKey = window._replyCfg?.brevo_api_key;
  }
  if (!brevoKey) { alert('No Brevo API key found. Add one in Settings or to the inbox.'); return; }
  const htmlBody = '<html><body>' + body.replace(/\n/g,'<br>') + '</body></html>';
  const payload = { sender: { email: fromEmail, name: fromName || fromEmail }, to: [{ email: toEmail }], subject, htmlContent: htmlBody };
  if (inReplyTo) { payload.headers = { 'In-Reply-To': inReplyTo, 'References': inReplyTo }; }
  try {
    const res = await fetch('https://api.brevo.com/v3/smtp/email', {
      method: 'POST',
      headers: { 'api-key': brevoKey, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) { const e = await res.text(); alert('Send failed: ' + e); return; }
    await sb.from('replies').update({ replied_at: new Date().toISOString(), reply_body: body }).eq('id', replyId);
    closeModal();
    renderReplies();
    alert('Reply sent!');
  } catch(e) { alert('Error: ' + e.message); }
}

async function saveWarmupMailbox(id) {

    smtp_host: document.getElementById('wm-smtph').value.trim() || null,
    smtp_port: parseInt(document.getElementById('wm-smtpp').value) || 587,
    app_password: document.getElementById('wm-pass').value.replace(/\s+/g,''),
    reply_chance: (parseInt(document.getElementById('wm-reply').value)||40) / 100,
    rescue_from_spam: document.getElementById('wm-rescue').value === 'true',
    gmail_client_id: document.getElementById('wm-gcid').value.trim() || null,
    gmail_client_secret: document.getElementById('wm-gcsec').value.trim() || null,
    gmail_refresh_token: document.getElementById('wm-grt').value.trim() || null,

async function sendManualWarmup() {
  const fromId = document.getElementById('wu-from').value;
  const toId = document.getElementById('wu-to').value;
  const subject = document.getElementById('wu-subj').value.trim();
  const body = document.getElementById('wu-body').value.trim();
  const status = document.getElementById('wu-status');
  if (!fromId || !toId || !subject || !body) { alert('All fields required'); return; }
  const inbox = (window._warmupInboxes||[]).find(i => i.id === fromId);
  const toMb = (window._warmupMbs||[]).find(m => m.id === toId);
  if (!inbox || !toMb) { alert('Could not find inbox or mailbox'); return; }
  const { data: settRows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((settRows||[]).map(r => [r.key, typeof r.value === 'string' ? r.value.replace(/^"|"$/g,'') : (r.value||'')]));
  const brevoKey = inbox.brevo_api_key || cfg.brevo_api_key;
  if (!brevoKey) { alert('No Brevo API key on this inbox. Add one in the Inboxes tab.'); return; }
  status.textContent = 'Sending…';
  status.style.color = 'var(--gray)';
  try {
    const raw = inbox.email;
    const r = await fetch('https://api.brevo.com/v3/smtp/email', {
      method: 'POST',
      headers: { 'api-key': brevoKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sender: { email: raw, name: inbox.name || raw },
        to: [{ email: toMb.email, name: toMb.name || toMb.email }],
        subject,
        htmlContent: '<html><body>' + body.replace(/\n/g,'<br>') + '</body></html>',
        tags: ['warmup-manual'],
        headers: { 'X-Warmup-Type': 'manual' },
      }),
    });
    if (!r.ok) { const e = await r.text(); status.textContent = 'Failed: ' + e; status.style.color = 'var(--red)'; return; }
    status.textContent = '✓ Sent!';
    status.style.color = 'var(--green)';
    setTimeout(() => { status.textContent = ''; }, 4000);
  } catch(e) { status.textContent = 'Error: ' + e.message; status.style.color = 'var(--red)'; }
}

/* ─── DRAG-AND-DROP DASHBOARD LAYOUT ─── */
function makeSortable(containerId, storageKey) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const keyOf = el => el.id || (el.querySelector('h2,.countdown-label')?.textContent || '').trim().slice(0,40) || el.className;
  let kids = Array.from(c.children);
  kids.forEach(el => { el.dataset.dk = keyOf(el); el.setAttribute('draggable','true'); el.classList.add('dash-drag'); });

  let order = [];
  try { order = JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch(e){ order = []; }
  if (order.length) order.forEach(k => { const el = kids.find(x => x.dataset.dk === k && x.parentNode === c); if (el) c.appendChild(el); });

  let dragEl = null;
  Array.from(c.children).forEach(el => {
    el.addEventListener('dragstart', () => { dragEl = el; el.classList.add('dash-dragging'); });
    el.addEventListener('dragend', () => {
      el.classList.remove('dash-dragging');
      const ks = Array.from(c.children).map(x => x.dataset.dk);
      localStorage.setItem(storageKey, JSON.stringify(ks));
    });
  });
  c.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragEl) return;
    const after = [...c.children].filter(x => x !== dragEl).find(child => {
      const box = child.getBoundingClientRect();
      return e.clientY < box.top + box.height / 2;
    });
    if (after) c.insertBefore(dragEl, after); else c.appendChild(dragEl);
  });
}

async function saveProxyAssignments() {
  const { data: proxies } = await sb.from('proxies').select('*');
  const proxyMap = {};
  (proxies || []).forEach(p => { proxyMap[p.id] = p; });

  const updates = _assignMailboxIds.map(async mbId => {
    const sel = document.getElementById('mbproxy-' + mbId);
    if (!sel) return;
    const proxyId = sel.value || null;
    const proxy = proxyId ? proxyMap[proxyId] : null;
    const payload = {
      proxy_id: proxyId,
      proxy_host: proxy ? proxy.host : null,
      proxy_port: proxy ? proxy.port : null,
      proxy_user: proxy ? (proxy.username || null) : null,
      proxy_pass: proxy ? (proxy.password || null) : null,
    };
    return sb.from('warmup_mailboxes').update(payload).eq('id', mbId);
  });

  const results = await Promise.all(updates);
  const err = results.find(r => r && r.error);
  if (err) { alert('Save failed: ' + err.error.message); return; }
  closeModal(); renderProxies();
  alert('✓ Proxy assignments saved');
}

    </div>`);
}

function loadProxyFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('px-import-text').value = e.target.result;
    previewProxyImport();
  };
  reader.readAsText(file);
}

function parseProxyLines(text) {
  return (text || '').split('\n')
    .map(l => l.trim())
    .filter(l => l && l.includes(':'))
    .map(l => {
      const parts = l.split(':');
      if (parts.length < 2) return null;
      return {
        host: parts[0].trim(),
        port: parseInt(parts[1]) || 1080,
        username: parts[2] ? parts[2].trim() : '',
        password: parts[3] ? parts[3].trim() : '',
      };
    })
    .filter(Boolean);
}

function previewProxyImport() {
  const lines = parseProxyLines(document.getElementById('px-import-text').value);
  const el = document.getElementById('px-import-preview');
  if (el) el.textContent = lines.length ? `✓ ${lines.length} proxies detected` : '';
}

async function importProxies() {
  const text = document.getElementById('px-import-text').value;
  const labelPrefix = document.getElementById('px-import-label').value.trim() || 'Seed';
  const lines = parseProxyLines(text);
  if (!lines.length) { alert('No valid proxy lines found. Format must be IP:PORT:USER:PASS'); return; }

  // Find the current highest number for this label prefix so we don't re-number existing ones
  const { data: existing } = await sb.from('proxies').select('label').ilike('label', `${labelPrefix} %`);
  const usedNums = (existing || []).map(r => {
    const m = r.label.match(/(\d+)$/);
    return m ? parseInt(m[1]) : 0;
  });
  let startNum = usedNums.length ? Math.max(...usedNums) + 1 : 1;

  const rows = lines.map((p, i) => ({
    label: `${labelPrefix} ${startNum + i}`,
    host: p.host,
    port: p.port,
    username: p.username || null,
    password: p.password || null,
    active: true,
  }));

  const { error } = await sb.from('proxies').insert(rows);
  if (error) { alert('Import failed: ' + error.message); return; }
  closeModal();
  renderProxies();
  alert(`✓ Imported ${rows.length} proxies`);
}
</script>
