<style>
  /* --- UI STYLES (Matches Login Page) --- */
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    min-height: 60vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .login-card {
    background: #111827;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    color: #e5e7eb;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .login-card h1 { margin: 0 0 10px; color: #fff; font-size: 24px; }
  .login-card p { color: #9ca3af; margin-bottom: 24px; font-size: 14px; }
  
  .login-input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: white;
    font-size: 16px;
    outline: none;
    box-sizing: border-box; 
  }
  .login-input:focus { border-color: #22c55e; }
  
  .login-btn {
    width: 100%;
    padding: 14px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
  }
  .login-btn:hover { background: #16a34a; }
  .login-btn:disabled { opacity: 0.7; cursor: wait; }

  .status-text { margin-top: 15px; font-size: 13px; min-height: 20px; }

  /* Fix for dropdown options in dark mode */
  select.login-input option {
    background: #111827; 
    color: white;
  }

  /* --- NEW: PASSWORD REQUIREMENTS STYLES --- */
  .req-list {
    text-align: left;
    margin-bottom: 15px;
    padding: 0 4px;
  }
  .req-item {
    font-size: 12px;
    color: #6b7280; /* Gray when unmet */
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s ease;
  }
  .req-item::before {
    content: "•"; /* Bullet point */
    font-size: 16px;
    line-height: 1;
  }
  
  /* When the requirement is met, it lights up GREEN */
  .req-item.met {
    color: #22c55e; 
  }
  .req-item.met::before {
    content: "✓"; /* Checkmark */
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <h1>Reset Password</h1>
    <p>Please create a new secure password.</p>
    
    <input id="first-name" class="login-input" type="text" placeholder="First Name" required />
<input id="last-name" class="login-input" type="text" placeholder="Last Name" required />
<input id="phone-field"
       class="login-input"
       type="text"
       inputmode="numeric"
       maxlength="10"
       placeholder="10 Digit Phone Number"
       required />
    <select id="service-area" class="login-input" required>
      <option value="" disabled selected>Select Service Area</option>
      <option value="Billings">Billings</option>
      <option value="Bozeman">Bozeman</option>
      <option value="Cincinnati">Cincinnati</option>
      <option value="Missoula">Missoula</option>
      
    </select>
    
    <input id="new-pass" class="login-input" type="password" placeholder="New Password" required />
    
    <div class="req-list">
      <div id="rule-length" class="req-item">At least 12 characters</div>
      <div id="rule-cap" class="req-item">One capital letter</div>
      <div id="rule-num" class="req-item">One number</div>
      <div id="rule-special" class="req-item">One special character</div>
    </div>

    <input id="confirm-pass" class="login-input" type="password" placeholder="Confirm Password" required />

    <button id="update-btn" class="login-btn">Update Password</button>
    <div id="status-msg" class="status-text"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function() {
    
    // 1. CONFIGURATION
    const SUPABASE_URL = "https://rfdvogakvyodixgpvqvz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E".trim();

    const passwordResetClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const msg = document.getElementById('status-msg'); // <--- ADD THIS LINE
    const btn = document.getElementById('update-btn');
    const newPassInput = document.getElementById('new-pass');
    const confirmPassInput = document.getElementById('confirm-pass');
    const phoneInput = document.getElementById('phone-field');

phoneInput.addEventListener('input', function () {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});


    // Requirement Elements
    const ruleLength = document.getElementById('rule-length');
    const ruleCap = document.getElementById('rule-cap');
    const ruleNum = document.getElementById('rule-num');
    const ruleSpecial = document.getElementById('rule-special');

    // 2. CHECK SESSION
    const { data, error } = await passwordResetClient.auth.getSession();

    if (error || !data.session) {
      msg.textContent = "Session expired. Please request a new code.";
      msg.style.color = "#ef4444";
      btn.disabled = true;
      return;
    }

    // 3. REAL-TIME VALIDATION LISTENER
    newPassInput.addEventListener('input', function() {
      const val = newPassInput.value;

      // Check Length (12+)
      if (val.length >= 12) ruleLength.classList.add('met');
      else ruleLength.classList.remove('met');

      // Check Capital Letter
      if (/[A-Z]/.test(val)) ruleCap.classList.add('met');
      else ruleCap.classList.remove('met');

      // Check Number
      if (/[0-9]/.test(val)) ruleNum.classList.add('met');
      else ruleNum.classList.remove('met');

      // Check Special Character (anything not A-Z or 0-9)
      if (/[^A-Za-z0-9]/.test(val)) ruleSpecial.classList.add('met');
      else ruleSpecial.classList.remove('met');
    });

    // 4. BUTTON CLICK HANDLER
    btn.addEventListener('click', async () => {
      msg.textContent = "";
      msg.style.color = "";

      const newPass = newPassInput.value;
      const confirmPass = confirmPassInput.value;
      const firstName = document.getElementById('first-name').value.trim();
const lastName = document.getElementById('last-name').value.trim();

      const serviceArea = document.getElementById('service-area').value;
      const phone = document.getElementById('phone-field').value.trim();


      if (!newPass || !confirmPass || !firstName || !lastName || !serviceArea || !phone) {


        msg.textContent = "Please fill in all fields.";
        msg.style.color = "#ef4444";
        return;
      }

if (!/^\d{10}$/.test(phone)) {
  msg.textContent = "Phone number must be exactly 10 digits.";
  msg.style.color = "#ef4444";
  return;
}


      if (newPass !== confirmPass) {
        msg.textContent = "Passwords do not match.";
        msg.style.color = "#ef4444";
        return;
      }

      // Final Validation Check before sending
      if (newPass.length < 12 || 
          !/[A-Z]/.test(newPass) || 
          !/[0-9]/.test(newPass) || 
          !/[^A-Za-z0-9]/.test(newPass)) {
        msg.textContent = "Please meet all password requirements above.";
        msg.style.color = "#ef4444";
        return;
      }

      // Start Update
      btn.innerText = "Updating...";
      btn.disabled = true;

      try {
        const { error } = await passwordResetClient.auth.updateUser({
          password: newPass,
          data: { 
  first_name: firstName,
  last_name: lastName,
  phone: phone,
  service_area: serviceArea
}


        });

        if (error) throw error;

        msg.textContent = "Account updated! Redirecting...";
        msg.style.color = "#22c55e";

        setTimeout(() => {
          window.location.href = "/login-credentials";
        }, 2000);

      } catch (err) {
        console.error("Update Error:", err);
        msg.textContent = "Error: " + err.message;
        msg.style.color = "#ef4444";
        btn.innerText = "Update Password";
        btn.disabled = false;
      }
    });
  });
</script>
